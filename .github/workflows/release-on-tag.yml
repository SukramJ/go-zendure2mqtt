name: "Release: Create from Tag"
# yamllint disable-line rule:truthy
on:
  push:
    tags:
      - '**'

permissions:
  contents: write

# One concurrent release per tag — re-pushing the same tag overrides
# the previous in-flight run instead of racing it.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"

jobs:
  create_release:
    if: github.repository_owner == 'SukramJ'
    name: Create GitHub Release (${{ github.ref_name }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          # Fetch full history so git-describe can resolve the tag.
          fetch-depth: 0

      - name: Determine version from tag
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          # Strip a leading 'v' to map tags like v1.2.3 -> 1.2.3
          VERSION="${TAG_NAME#v}"
          echo "TAG_NAME=${TAG_NAME}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Tag: $TAG_NAME -> $VERSION"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # `make release` is the single source of truth: cross-compiles
      # the matrix, bundles each target with the YAML assets and docs,
      # generates SHA256SUMS, and writes dist/RELEASE_NOTES.md from
      # the matching changelog.md section. Local dry-runs use the
      # same command — no chance of CI / local drift.
      - name: Build release archives + extract notes
        run: |
          make release RELEASE_VERSION="${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body_path: dist/RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
