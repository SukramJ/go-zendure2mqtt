version: 2
updates:
  # Go modules (root)
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    reviewers:
      - "SukramJ"
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Bundle minor/patch bumps into one PR; majors stay individual so
      # they get a focused review.
      go-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions (pinned by commit SHA; Dependabot bumps the SHA and
  # keeps the `# vX` version comment in sync).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    reviewers:
      - "SukramJ"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns: ["*"]
